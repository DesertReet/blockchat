def toTaskSuffix = { String raw ->
	raw.replaceAll(/[^0-9A-Za-z]+/, ' ')
		.trim()
		.split(/\s+/)
		.findAll { !it.isEmpty() }
		.collect { it.substring(0, 1).toUpperCase(Locale.ROOT) + it.substring(1) }
		.join('')
}

def compareMinecraftVersions
compareMinecraftVersions = { String left, String right ->
	def toParts = { String value ->
		value.tokenize('.').collect { token ->
			token ==~ /\d+/ ? [0, Integer.parseInt(token)] : [1, token]
		}
	}
	def leftParts = toParts(left)
	def rightParts = toParts(right)
	def maxSize = Math.max(leftParts.size(), rightParts.size())
	for (int i = 0; i < maxSize; i++) {
		def leftPart = i < leftParts.size() ? leftParts[i] : [0, 0]
		def rightPart = i < rightParts.size() ? rightParts[i] : [0, 0]
		def typeCompare = leftPart[0] <=> rightPart[0]
		if (typeCompare != 0) {
			return typeCompare
		}
		def valueCompare = leftPart[1] <=> rightPart[1]
		if (valueCompare != 0) {
			return valueCompare
		}
	}
	0
}

def readVersionProperties = { Project versionProject ->
	Properties props = new Properties()
	versionProject.file("version.properties").withInputStream(props.&load)
	def minecraftVersion = props.getProperty("minecraft_version", "").trim()
	if (minecraftVersion.isEmpty()) {
		throw new GradleException("Missing minecraft_version in ${versionProject.file('version.properties')}")
	}
	def archiveMinecraftVersion = props.getProperty("archive_minecraft_version", minecraftVersion).trim()
	def versionAliases = props.getProperty("version_aliases", "")
		.split(",")
		.collect { it.trim() }
		.findAll { !it.isEmpty() }
		.unique()
	def javaVersion = props.getProperty("java_version", "21").trim()
	def loaderVersion = props.getProperty("loader_version", rootProject.property("loader_version").toString()).trim()
	def modMenuVersion = props.getProperty("modmenu_version", "").trim()
	def usesRemap = props.getProperty("loom_mode", "remap").trim() != "named"
	return [
		minecraftVersion         : minecraftVersion,
		minecraftDependency      : props.getProperty("minecraft_dependency", "~${minecraftVersion}").trim(),
		javaVersion              : Integer.parseInt(javaVersion),
		javaDependency           : props.getProperty("java_dependency", ">=" + javaVersion).trim(),
		mixinCompatibilityLevel  : props.getProperty("mixin_compatibility_level", "JAVA_" + javaVersion).trim(),
		usesRemap                : usesRemap,
		loaderVersion            : loaderVersion,
		fabricApiVersion         : props.getProperty("fabric_api_version", "").trim(),
		modMenuVersion           : modMenuVersion,
		modMenuEnabled           : !modMenuVersion.isEmpty(),
		archiveMinecraftVersion  : archiveMinecraftVersion,
		overlayFromVersion       : props.getProperty("overlay_from", "").trim(),
		lookupNames             : ([versionProject.projectDir.name, minecraftVersion, archiveMinecraftVersion] + versionAliases).unique(),
	]
}

def versionProjects = subprojects.findAll { it.file("version.properties").isFile() }
def versionConfigsByPath = versionProjects.collectEntries { versionProject ->
	[(versionProject.path): readVersionProperties(versionProject)]
}
def orderedVersionProjects = versionProjects.sort { left, right ->
	compareMinecraftVersions(
		versionConfigsByPath[left.path].archiveMinecraftVersion,
		versionConfigsByPath[right.path].archiveMinecraftVersion
	)
}
def versionProjectByLookupName = [:] as LinkedHashMap<String, Project>
orderedVersionProjects.each { versionProject ->
	def versionConfig = versionConfigsByPath[versionProject.path]
	versionConfig.lookupNames.each { lookupName ->
		def existingProject = versionProjectByLookupName[lookupName]
		if (existingProject != null && existingProject.path != versionProject.path) {
			throw new GradleException(
				"Duplicate BlockChat Minecraft version lookup '${lookupName}' between ${existingProject.projectDir.name} and ${versionProject.projectDir.name}."
			)
		}
		versionProjectByLookupName[lookupName] = versionProject
	}
}
def resolveOverlayProjects
resolveOverlayProjects = { Project versionProject, Set<String> seenPaths = [] as Set<String> ->
	if (!seenPaths.add(versionProject.path)) {
		def cycle = (seenPaths + versionProject.path).collect { path ->
			versionConfigsByPath[path]?.minecraftVersion ?: path
		}.join(" -> ")
		throw new GradleException("Detected cyclic BlockChat version overlay chain: ${cycle}")
	}
	def versionConfig = versionConfigsByPath[versionProject.path]
	def overlayFromVersion = versionConfig.overlayFromVersion
	if (overlayFromVersion.isEmpty()) {
		return []
	}
	def overlayProject = versionProjectByLookupName[overlayFromVersion]
	if (overlayProject == null) {
		throw new GradleException(
			"BlockChat Minecraft ${versionConfig.minecraftVersion} declares overlay_from=${overlayFromVersion}, but that version is not configured."
		)
	}
	return resolveOverlayProjects(overlayProject, seenPaths) + [overlayProject]
}
def overlayProjectsByPath = orderedVersionProjects.collectEntries { versionProject ->
	[(versionProject.path): resolveOverlayProjects(versionProject)]
}

