def ffmpegDownloadTasks = ffmpegBundles.collect { ffmpegBundle ->
	def bundle = ffmpegBundle
	def ffmpegPlatformCacheDir = new File(ffmpegCacheDir, bundle.platformKey)
	def ffmpegMarkerFile = new File(ffmpegPlatformCacheDir, ".downloaded")
	def expectedMarkerContents = (
		["platform=${bundle.platformKey}"]
			+ bundle.assets.collect { asset ->
				"asset=${asset.archiveName}|sha256=${asset.sha256}|url=${asset.url}"
			}
	).join("\n") + "\n"

	tasks.register("downloadFFmpeg${bundle.taskSuffix}") {
		group = 'blockchat'
		description = "Downloads the bundled FFmpeg binaries for ${bundle.platformKey}"
		outputs.file(ffmpegMarkerFile)
		onlyIf {
			if (!ffmpegMarkerFile.exists()) {
				return true
			}
			if (ffmpegMarkerFile.text != expectedMarkerContents) {
				return true
			}
			bundle.assets.collectMany { asset -> asset.binaryNames }.any { binaryName ->
				!new File(ffmpegPlatformCacheDir, binaryName).exists()
			}
		}
		doLast {
			ffmpegPlatformCacheDir.mkdirs()
			logger.lifecycle("Downloading bundled FFmpeg binaries for ${bundle.platformKey} ...")

			bundle.assets.each { asset ->
				def archiveFile = new File(ffmpegPlatformCacheDir, asset.archiveName)
				logger.lifecycle("  Fetching ${asset.archiveName} from ${asset.url}")

				def currentUrl = new URL(asset.url)
				def connection = currentUrl.openConnection()
				def maxRedirects = 10
				for (int i = 0; i < maxRedirects; i++) {
					connection.setInstanceFollowRedirects(false)
					connection.connect()
					def responseCode = connection.getResponseCode()
					if (responseCode == 301 || responseCode == 302 || responseCode == 303 || responseCode == 307 || responseCode == 308) {
						def redirectLocation = connection.getHeaderField("Location")
						currentUrl = new URL(currentUrl, redirectLocation)
						logger.lifecycle("    Following redirect -> ${currentUrl}")
						connection = currentUrl.openConnection()
					} else {
						break
					}
				}

				archiveFile.withOutputStream { out ->
					connection.getInputStream().withStream { inp ->
						out << inp
					}
				}
				logger.lifecycle("    Downloaded ${archiveFile.length()} bytes")
				def actualSha256 = sha256Hex(archiveFile)
				if (!actualSha256.equalsIgnoreCase(asset.sha256)) {
					throw new GradleException(
						"FFmpeg download checksum mismatch for ${bundle.platformKey} ${asset.archiveName}: expected ${asset.sha256}, got ${actualSha256}"
					)
				}
				logger.lifecycle("    SHA-256 verified: ${actualSha256}")

				def tmpExtract = new File(ffmpegPlatformCacheDir, "_extract-${asset.archiveName}")
				tmpExtract.mkdirs()
				try {
					if (asset.archiveType == "zip" || asset.archiveType == "zip-nested") {
						copy {
							from zipTree(archiveFile)
							into tmpExtract
						}
					} else if (asset.archiveType == "tar.xz-nested") {
						copy {
							from tarTree(resources.xz(archiveFile))
							into tmpExtract
						}
					} else {
						throw new GradleException("Unsupported FFmpeg archive type ${asset.archiveType} for ${bundle.platformKey}")
					}

					asset.binaryNames.each { binaryName ->
						def extractedBinary = fileTree(tmpExtract).matching {
							include "**/${binaryName}"
						}.files.find { it.isFile() }
						if (extractedBinary == null) {
							throw new GradleException("FFmpeg download failed: expected binary ${binaryName} not found in ${archiveFile}")
						}
						def targetBinary = new File(ffmpegPlatformCacheDir, binaryName)
						copy {
							from extractedBinary
							into ffmpegPlatformCacheDir
						}
						targetBinary.setExecutable(true, false)
						logger.lifecycle("    FFmpeg binary ready: ${targetBinary.absolutePath} (${targetBinary.length()} bytes)")
					}
				} finally {
					delete(tmpExtract)
					delete(archiveFile)
				}
			}

			bundle.assets.collectMany { it.binaryNames }.each { binaryName ->
				def bin = new File(ffmpegPlatformCacheDir, binaryName)
				if (!bin.exists()) {
					throw new GradleException("FFmpeg download failed: expected binary ${binaryName} not found in ${ffmpegPlatformCacheDir}")
				}
				bin.setExecutable(true, false)
			}

			ffmpegMarkerFile.text = expectedMarkerContents
		}
	}
}

configure(orderedVersionProjects) { Project versionProject ->
	def versionConfig = versionConfigsByPath[versionProject.path]
	def overlayProjects = overlayProjectsByPath[versionProject.path]
	def loomPluginId = versionConfig.usesRemap ? "net.fabricmc.fabric-loom-remap" : "net.fabricmc.fabric-loom"

	versionProject.apply plugin: loomPluginId
	versionProject.apply plugin: "maven-publish"

	versionProject.group = rootProject.group
	versionProject.version = rootProject.version

	def mergedClientJavaDir = versionProject.layout.buildDirectory.dir("generated/blockchat/client/java")
	def mergedClientResourcesDir = versionProject.layout.buildDirectory.dir("generated/blockchat/client/resources")
	def mergedMainResourcesDir = versionProject.layout.buildDirectory.dir("generated/blockchat/main/resources")
	def generatedMetadataDir = versionProject.layout.buildDirectory.dir("generated/blockchat/version-metadata")

	def fabricModJson = [
		schemaVersion: 1,
		id           : fabricModId,
		version      : versionProject.version.toString(),
		name         : "BlockChat by Desert Reet",
		description  : "A social mod for Minecraft where you can instantly send screenshots and videos to friends.",
		license      : fabricModLicense,
		icon         : "assets/desertreet-blockchat/icon.png",
		environment  : "client",
		contact      : [
			homepage: "https://blockchat.desertreet.com"
		],
		entrypoints  : [
			client: ["desertreet.blockchat.BlockChatClientMod"]
		] + (versionConfig.modMenuEnabled
			? [modmenu: ["desertreet.blockchat.BlockChatModMenuApi"]]
			: [:]),
		mixins       : [
			"desertreet-blockchat.client.mixins.json"
		],
			depends      : [
				fabricloader: ">=" + versionConfig.loaderVersion,
				minecraft   : versionConfig.minecraftDependency,
				java        : versionConfig.javaDependency,
				"fabric-api": ">=" + versionConfig.fabricApiVersion
			]
		]
	def generateMetadata = versionProject.tasks.register("generateBlockChatMetadata") {
		def metadataFile = generatedMetadataDir.map { new File(it.asFile, "fabric.mod.json") }
		outputs.file(metadataFile)
		doLast {
			def generatedMetadataDirFile = generatedMetadataDir.get().asFile
			generatedMetadataDirFile.mkdirs()
			new File(generatedMetadataDirFile, "fabric.mod.json").text =
				JsonOutput.prettyPrint(JsonOutput.toJson(fabricModJson)) + "\n"
		}
	}

	def mergeClientSources = versionProject.tasks.register("mergeBlockChatClientSources", Sync) {
		duplicatesStrategy = org.gradle.api.file.DuplicatesStrategy.INCLUDE
		from(rootProject.file("src/core/java"))
		from(rootProject.file("src/shared/client/java"))
		overlayProjects.each { overlayProject ->
			from(overlayProject.file("src/client/java"))
		}
		from(versionProject.file("src/client/java"))
		into mergedClientJavaDir
	}
	def mergeClientResources = versionProject.tasks.register("mergeBlockChatClientResources", Sync) {
		duplicatesStrategy = org.gradle.api.file.DuplicatesStrategy.INCLUDE
		from(rootProject.file("src/shared/client/resources"))
		overlayProjects.each { overlayProject ->
			from(overlayProject.file("src/client/resources"))
		}
		from(versionProject.file("src/client/resources"))
		into mergedClientResourcesDir
	}
	def mergeMainResources = versionProject.tasks.register("mergeBlockChatMainResources", Sync) {
		duplicatesStrategy = org.gradle.api.file.DuplicatesStrategy.INCLUDE
		dependsOn generateMetadata
		from(generatedMetadataDir)
		from(rootProject.file("src/shared/main/resources"))
		overlayProjects.each { overlayProject ->
			from(overlayProject.file("src/main/resources"))
		}
		from(versionProject.file("src/main/resources"))
		into mergedMainResourcesDir
	}

	versionProject.base {
		archivesName = rootProject.property("archives_base_name").toString()
	}

	versionProject.repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		maven {
			name = 'Terraformers'
			url = 'https://maven.terraformersmc.com/releases/'
		}
		mavenCentral()
	}

	versionProject.loom {
		splitEnvironmentSourceSets()

		mods {
			"${fabricModId}" {
				sourceSet versionProject.sourceSets.main
				sourceSet versionProject.sourceSets.client
			}
		}
	}

	versionProject.sourceSets {
		main {
			java.setSrcDirs([])
			resources.setSrcDirs([mergedMainResourcesDir])
		}
		client {
			java.setSrcDirs([mergedClientJavaDir])
			resources.setSrcDirs([mergedClientResourcesDir])
		}
	}

	if (!versionConfig.modMenuEnabled) {
		versionProject.sourceSets.client.java.exclude("desertreet/blockchat/BlockChatModMenuApi.java")
	}

	versionProject.dependencies {
		minecraft "com.mojang:minecraft:${versionConfig.minecraftVersion}"

		if (versionConfig.usesRemap) {
			mappings versionProject.loom.officialMojangMappings()
			modImplementation "net.fabricmc:fabric-loader:${versionConfig.loaderVersion}"
			modImplementation "net.fabricmc.fabric-api:fabric-api:${versionConfig.fabricApiVersion}"
			if (versionConfig.modMenuEnabled) {
				modCompileOnly "com.terraformersmc:modmenu:${versionConfig.modMenuVersion}"
			}
		} else {
			implementation "net.fabricmc:fabric-loader:${versionConfig.loaderVersion}"
			implementation "net.fabricmc.fabric-api:fabric-api:${versionConfig.fabricApiVersion}"
			if (versionConfig.modMenuEnabled) {
				compileOnly "com.terraformersmc:modmenu:${versionConfig.modMenuVersion}"
			}
		}
	}

	versionProject.tasks.named("compileClientJava").configure {
		dependsOn mergeClientSources
	}

	versionProject.tasks.named("processResources").configure {
		dependsOn mergeMainResources
	}

	versionProject.tasks.named("processClientResources").configure {
		dependsOn mergeClientResources
		dependsOn ffmpegDownloadTasks
		if (buildMacOsCaptureHelper != null) {
			dependsOn buildMacOsCaptureHelper
		}

		inputs.property "mixinCompatibilityLevel", versionConfig.mixinCompatibilityLevel

		filesMatching("desertreet-blockchat.client.mixins.json") {
			expand("mixinCompatibilityLevel": inputs.properties.mixinCompatibilityLevel)
		}

		from({
			builtMacCaptureHelper.isFile() ? [builtMacCaptureHelper] : []
		}) {
			into "blockchat-native/bins/macos"
		}

		from({
			builtWindowsHelper.isFile() ? [builtWindowsHelper] : []
		}) {
			into "blockchat-native/bins/windows"
		}

		ffmpegBundles.each { ffmpegBundle ->
			def bundle = ffmpegBundle
			def platformCacheDir = new File(ffmpegCacheDir, bundle.platformKey)
			from({
				bundle.assets.collectMany { asset ->
					asset.binaryNames.collect { binaryName ->
						def binary = new File(platformCacheDir, binaryName)
						binary.exists() ? [binary] : []
					}
				}.flatten()
			}) {
				into bundle.resourcePath
			}
		}
	}

	versionProject.tasks.withType(JavaCompile).configureEach {
		options.release = versionConfig.javaVersion
	}

	versionProject.java {
		toolchain {
			languageVersion = JavaLanguageVersion.of(versionConfig.javaVersion)
		}
		sourceCompatibility = JavaVersion.toVersion(versionConfig.javaVersion)
		targetCompatibility = JavaVersion.toVersion(versionConfig.javaVersion)
	}

	versionProject.jar {
		["LICENSE", "THIRD_PARTY_NOTICES"].each { bundledLegalDoc ->
			def docFile = rootProject.file(bundledLegalDoc)
			if (docFile.exists()) {
				from(docFile) {
					rename { "${it}_${versionProject.base.archivesName.get()}" }
				}
			}
		}
	}

	if (versionConfig.usesRemap) {
		versionProject.tasks.named("remapJar").configure {
			destinationDirectory.set(versionProject.layout.buildDirectory.dir("tmp/blockchat-remap"))
		}
	}

	def upstreamJarTaskName = versionConfig.usesRemap ? "remapJar" : "jar"
	def packageTasks = blockchatJarVariants.collect { variant ->
		def taskName = "packageBlockChat${variant.taskSuffix}Jar"
		versionProject.tasks.register(taskName, Zip) {
			group = "blockchat"
			description = "Packages the BlockChat ${variant.classifier} jar for Minecraft ${versionConfig.archiveMinecraftVersion}."
			dependsOn versionProject.tasks.named(upstreamJarTaskName)
			dependsOn ffmpegDownloadTasks
			archiveBaseName.set(fabricModId)
			archiveVersion.set(versionProject.version.toString())
			archiveClassifier.set("${variant.classifier}+${versionConfig.archiveMinecraftVersion}")
			archiveExtension.set("jar")
			destinationDirectory.set(rootProject.layout.buildDirectory.dir("libs"))
			from({
				zipTree(versionProject.tasks.named(upstreamJarTaskName).get().archiveFile.get().asFile)
			}) {
				includeEmptyDirs = false
				eachFile { details ->
					if (details.path.startsWith("blockchat-native/")) {
						def keepPrefixes = [
							"blockchat-native/bins/${variant.helperResourceKey}/",
							"blockchat-native/bins/${variant.ffmpegResourceKey}/"
						]
						if (!keepPrefixes.any { prefix -> details.path.startsWith(prefix) }) {
							details.exclude()
						}
					}
				}
			}
		}
	}

	versionProject.tasks.named("assemble").configure {
		dependsOn packageTasks
	}

	versionProject.tasks.named("build").configure {
		dependsOn packageTasks
	}
}

def defaultMinecraftVersion = rootProject.property("default_minecraft_version").toString()
def defaultVersionProject = versionProjectByLookupName[defaultMinecraftVersion]
def effectiveDefaultVersionProject = defaultVersionProject ?: orderedVersionProjects.find()
if (effectiveDefaultVersionProject == null) {
	throw new GradleException("No BlockChat version projects were included. Check versions/*/version.properties or the active version filter.")
}

tasks.register("listMinecraftVersions") {
	group = "blockchat"
	description = "Prints the supported BlockChat Minecraft versions."
	doLast {
		orderedVersionProjects.each { versionProject ->
			println(versionConfigsByPath[versionProject.path].archiveMinecraftVersion)
		}
	}
}

tasks.register("buildDefaultVersion") {
	group = "blockchat"
	description = "Builds the default BlockChat Minecraft version (${versionConfigsByPath[effectiveDefaultVersionProject.path].archiveMinecraftVersion})."
	dependsOn("${effectiveDefaultVersionProject.path}:build")
}

tasks.register("assembleDefaultVersion") {
	group = "blockchat"
	description = "Assembles the default BlockChat Minecraft version (${versionConfigsByPath[effectiveDefaultVersionProject.path].archiveMinecraftVersion})."
	dependsOn("${effectiveDefaultVersionProject.path}:assemble")
}

tasks.register("buildAllVersions") {
	group = "blockchat"
	description = "Builds every configured BlockChat Minecraft version."
	dependsOn(orderedVersionProjects.collect { "${it.path}:build" })
}

tasks.register("assembleAllVersions") {
	group = "blockchat"
	description = "Assembles every configured BlockChat Minecraft version."
	dependsOn(orderedVersionProjects.collect { "${it.path}:assemble" })
}

tasks.register("packageMacReleaseJars") {
	group = "blockchat"
	description = "Packages every configured macOS release jar."
	dependsOn(orderedVersionProjects.collectMany { versionProject ->
		[
			"${versionProject.path}:packageBlockChatMacOsArm64Jar",
			"${versionProject.path}:packageBlockChatMacOsAmd64Jar"
		]
	})
}

tasks.register("packageWindowsReleaseJars") {
	group = "blockchat"
	description = "Packages every configured Windows release jar."
	dependsOn(orderedVersionProjects.collect { "${it.path}:packageBlockChatWindowsJar" })
}

tasks.register("buildVersion") {
	group = "blockchat"
	description = "Builds one Minecraft version. Use -Pblockchat.minecraftVersion=<version>."
	def requestedMinecraftVersion = providers.gradleProperty("blockchat.minecraftVersion").orNull
	if (requestedMinecraftVersion != null) {
		def versionProject = versionProjectByLookupName[requestedMinecraftVersion]
		if (versionProject == null) {
			throw new GradleException("Unsupported BlockChat Minecraft version '${requestedMinecraftVersion}'. Run listMinecraftVersions to see valid values.")
		}
		dependsOn("${versionProject.path}:build")
	}
	doFirst {
		if (requestedMinecraftVersion == null) {
			throw new GradleException("Missing -Pblockchat.minecraftVersion=<version>. Run listMinecraftVersions to see valid values.")
		}
	}
}

orderedVersionProjects.each { versionProject ->
	def minecraftVersion = versionConfigsByPath[versionProject.path].archiveMinecraftVersion
	def taskSuffix = toTaskSuffix(minecraftVersion)
	tasks.register("buildMinecraft${taskSuffix}") {
		group = "blockchat"
		description = "Builds BlockChat for Minecraft ${minecraftVersion}."
		dependsOn("${versionProject.path}:build")
	}
	tasks.register("assembleMinecraft${taskSuffix}") {
		group = "blockchat"
		description = "Assembles BlockChat for Minecraft ${minecraftVersion}."
		dependsOn("${versionProject.path}:assemble")
	}
}

tasks.named("assemble").configure {
	dependsOn(tasks.named("assembleDefaultVersion"))
}

tasks.named("build").configure {
	dependsOn(tasks.named("buildDefaultVersion"))
}

tasks.named("clean").configure {
	dependsOn(orderedVersionProjects.collect { "${it.path}:clean" })
}
