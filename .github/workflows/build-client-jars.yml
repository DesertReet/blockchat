name: Build client jars

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      minecraft_versions:
        description: "Comma-separated Minecraft versions to build (defaults to client/gradle.properties supported_minecraft_versions)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  macos-jars:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache FFmpeg downloads
        uses: actions/cache@v5
        with:
          path: client/native/ffmpeg-cache
          key: ffmpeg-cache-${{ runner.os }}-${{ hashFiles('client/build.gradle') }}
          restore-keys: |
            ffmpeg-cache-${{ runner.os }}-

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build macOS capture helper
        working-directory: client/native/macos-capture-helper
        run: zsh ./build-helper.sh

      - name: Build macOS jars
        shell: bash
        working-directory: client
        env:
          REQUESTED_VERSIONS: ${{ inputs.minecraft_versions }}
        run: |
          set -euo pipefail
          args=(--no-daemon packageMacReleaseJars)
          if [[ -n "${REQUESTED_VERSIONS:-}" ]]; then
            args+=("-Pblockchat.activeVersions=${REQUESTED_VERSIONS}")
          fi
          ./gradlew "${args[@]}"

      - name: Upload macOS jars
        uses: actions/upload-artifact@v4
        with:
          name: blockchat-macos-jars
          path: client/build/libs/desertreet-blockchat-*-macos-*+*.jar
          if-no-files-found: error

  windows-jars:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache FFmpeg downloads
        uses: actions/cache@v5
        with:
          path: client/native/ffmpeg-cache
          key: ffmpeg-cache-${{ runner.os }}-${{ hashFiles('client/build.gradle') }}
          restore-keys: |
            ffmpeg-cache-${{ runner.os }}-

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Windows capture helper
        working-directory: client/native/windows-capture-helper
        run: ./build-helper.cmd

      - name: Build Windows jars
        shell: bash
        working-directory: client
        env:
          REQUESTED_VERSIONS: ${{ inputs.minecraft_versions }}
        run: |
          set -euo pipefail
          args=(--no-daemon packageWindowsReleaseJars)
          if [[ -n "${REQUESTED_VERSIONS:-}" ]]; then
            args+=("-Pblockchat.activeVersions=${REQUESTED_VERSIONS}")
          fi
          ./gradlew.bat "${args[@]}"

      - name: Upload Windows jars
        uses: actions/upload-artifact@v4
        with:
          name: blockchat-windows-jars
          path: client/build/libs/desertreet-blockchat-*-windows+*.jar
          if-no-files-found: error
